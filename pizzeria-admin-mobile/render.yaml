services:
  - type: web
    name: pizzeria-admin-mobile
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_REALTIME_STREAM_URL
        sync: false
      - key: VITE_SW_VERSION
        sync: false
